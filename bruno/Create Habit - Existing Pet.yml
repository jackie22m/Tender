info:
  name: Create Habit - Existing Pet
  type: http
  seq: 8

http:
  method: POST
  url: http://localhost:9812/pets/1/habits
  body:
    type: json
    data: |-
      {
        "name": "Morning Walk",
        "category": "fitness",
        "targetFrequency": 3,
        "statBoost": "happiness"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
